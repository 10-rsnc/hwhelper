<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homework helper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Syne:wght@800&family=EB+Garamond:italic,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://makegradient.com/embed.js"></script>
</head>
<body>
    
    <nav class="navbar">
        <div class="logo-text">HOMEWORK HELPER</div>
        <a href="#" class="btn-download" download>Download App</a>
    </nav>

    <div 
        data-lumina-gradient
        data-colors='["#d5e1ff","#f7dbff","#ffcbff","#b6ebff","#ede8ff"]'
        data-mode="mesh"
        data-noise="0.25"
        data-speed="1"
        style="width: 100vw; height: 100vh; position: fixed; inset: 0; z-index: -1;"
    ></div>

    <main class="main-content">
        <div class="status-label">
            <span class="dot"></span> LIVE SOLUTIONS
        </div>

        <h1 class="hero-title">
            <div class="line-1">Built</div>
            <div class="line-2">with</div>
            <div class="line-3 italic-tilt">precision</div>
        </h1>

        <p class="description">
            Unmatched speed and accuracy thanks to<br>
            optical character recognition (OCR) and Gemini
        </p>

        <div class="button-group">
            <a href="https://discord.com" class="btn-black">Join Discord</a>
            <a href="#" class="btn-outline">View Features</a>
        </div>

        <div class="scroll-indicator">SCROLL</div>
    </main>

</body>
</html>
